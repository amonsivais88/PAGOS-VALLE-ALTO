  const sanitize = str => {
    if (!str) return '';
    var s = String(str);
    // Reemplazar caracteres especiales usando charCode para evitar problemas de encoding
    var result = '';
    for (var i = 0; i < s.length; i++) {
      var code = s.charCodeAt(i);
      if (code <= 127) {
        result += s[i];
      } else if (code === 225 || code === 224 || code === 226 || code === 227) {
        result += 'a';
      } // a con acento
      else if (code === 233 || code === 232 || code === 234) {
        result += 'e';
      } // e con acento
      else if (code === 237 || code === 236 || code === 238) {
        result += 'i';
      } // i con acento
      else if (code === 243 || code === 242 || code === 244 || code === 245) {
        result += 'o';
      } // o con acento
      else if (code === 250 || code === 249 || code === 251) {
        result += 'u';
      } // u con acento
      else if (code === 193) {
        result += 'A';
      } else if (code === 201) {
        result += 'E';
      } else if (code === 205) {
        result += 'I';
      } else if (code === 211) {
        result += 'O';
      } else if (code === 218) {
        result += 'U';
      } else if (code === 241 || code === 209) {
        result += code === 241 ? 'n' : 'N';
      } //    
      else if (code === 183 || code === 8212 || code === 8211 || code === 8722) {
        result += '-';
      } //        
      else if (code === 9472) {
        result += '-';
      } //  
      else {
        result += '';
      } // ignorar otros
    }
    return result;
  };
